# Unified iCloud backup — Personal Photos + Shared Library + iCloud Drive in one container, one auth.
# Drop at /volume1/docker/icloud/docker-compose.yml on NAS.
#
# First-time setup:
#   1. cd /volume1/docker/icloud && docker compose pull && docker compose up -d
#   2. docker exec -it icloud sh -c "icloud --username=YOUR@APPLE.ID --session-directory=/config/session_data"
#      Enter Apple ID password + 6-digit 2FA code from your trusted device.
#   3. First sync kicks off automatically per sync_interval in config.yaml.
services:
  icloud:
    image: ghcr.io/epheterson/icloud-docker-overlay:latest
    container_name: icloud
    restart: unless-stopped
    environment:
      - TZ=America/Los_Angeles
      - ENV_CONFIG_FILE_PATH=/config/config.yaml
    volumes:
      # Container-local config + cached session cookies
      - /volume1/docker/icloud/config:/config
      # Photo + Drive destinations under a NEW unified tree so we don't
      # conflict with the legacy boredazfcuk layout at
      # /volume1/ELP NAS/Pictures/iCloud/{Eric,Shared}. After the unified
      # container validates a full sync, those legacy dirs can be deleted.
      - /volume1/ELP NAS/iCloud-Unified/photos:/icloud/photos
      - /volume1/ELP NAS/iCloud-Unified/drive:/icloud/drive
    mem_limit: 1g
    memswap_limit: 2g
    cpu_shares: 512
