# Unified iCloud config — uses the patched mandarons schema with the new
# `photos.library_destinations` block that keeps Personal and Shared photos
# in separate directories (matching the boredazfcuk layout Eric had before).
# Schema docs: https://github.com/mandarons/icloud-docker/blob/main/config.yaml

app:
  credentials:
    username: epheterson@me.com
    # No password here — supplied interactively during 2FA setup; cached
    # in /config/session_data afterward.
    retry_login_interval: 600
  root: /icloud
  region: global
  logger:
    level: info
    filename: /config/icloud.log
  notifications:
    sync_summary:
      enabled: false   # Will wire Zosia/Telegram later if we want sync alerts.

# ─── Photos ───────────────────────────────────────────────────────────
# Sync both libraries every 12h. Per-library destinations keep Personal
# under photos/personal/ and Shared under photos/shared/ so we preserve
# the directory layout Eric had with the two boredazfcuk containers.
# Live Photos download both the HEIC AND the paired .mov automatically
# because "original" is in file_sizes (the orchestrator patch handles
# the .mov auto-append).
photos:
  destination: photos
  remove_obsolete: true       # mirror iCloud deletes (Eric's default)
  sync_interval: 43200        # 12 hours
  all_albums: false
  library_destinations:       # NEW — from feat/per-library-destinations PR
    PrimarySync: personal
    SharedLibrary: shared
  filters:
    libraries:
      - PrimarySync
      - SharedLibrary
    file_sizes:
      - original
  folder_format: "%Y/%m"

# ─── Drive ────────────────────────────────────────────────────────────
# 12h cadence to match photos. auto_delete defaults to false — accidental
# Drive deletions are riskier than photo deletes, so we keep tombstones.
drive:
  destination: drive
  remove_obsolete: false      # tombstones for Drive (configurable)
  sync_interval: 43200        # 12 hours
  filters:
    folders: []               # empty = sync entire Drive root
    file_extensions: []       # empty = all extensions
