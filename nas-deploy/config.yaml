# Unified iCloud config — REUSES existing boredazfcuk-format photo dirs
# via filename_format: simple (zero-redownload migration).
#
# Schema docs: https://github.com/mandarons/icloud-docker/blob/main/config.yaml
# (plus three new optional keys from epheterson/icloud-docker fork:
#  - photos.library_destinations
#  - photos.filename_format
#  - automatic Live Photo .mov pair download)

app:
  credentials:
    username: epheterson@me.com
    # Supplied interactively during 2FA setup; cached in /config/session_data.
    retry_login_interval: 600
  root: /icloud
  region: global
  logger:
    level: info
    filename: /config/icloud.log
  notifications:
    sync_summary:
      enabled: false   # Wire Zosia/Telegram later if we want sync alerts.

# ─── Photos ───────────────────────────────────────────────────────────
photos:
  destination: photos       # → /icloud/photos (mapped from /volume1/ELP NAS/Pictures/iCloud)
  remove_obsolete: true     # mirror iCloud deletes (Eric's default)
  sync_interval: 43200      # 12 hours
  all_albums: false
  # boredazfcuk-compat naming: produces plain IMG_1234.HEIC instead of
  # mandarons' default IMG_1234__original__<base64id>.HEIC. mandarons checks
  # existence by file SIZE so existing boredazfcuk files are recognised and
  # NOT re-downloaded.
  filename_format: simple
  # Keep Personal and Shared in separate subdirs (matching the boredazfcuk
  # layout Eric had with two containers). These names MUST match the
  # existing on-disk directories so the existence check finds the files.
  library_destinations:
    PrimarySync: Eric
    SharedLibrary: Shared
  filters:
    libraries:
      - PrimarySync
      - SharedLibrary
    file_sizes:
      - original              # also triggers Live Photo .mov pair auto-download
  # No folder_format — boredazfcuk doesn't sub-folder by date, so we don't
  # either. Existence check will match files at the root of each library dir.

# ─── Drive ────────────────────────────────────────────────────────────
drive:
  destination: drive          # → /icloud/drive (brand new dir on NAS)
  remove_obsolete: false      # tombstones for Drive (configurable)
  sync_interval: 43200        # 12 hours
  filters:
    folders: []               # empty = sync entire Drive root
    file_extensions: []       # empty = all extensions
